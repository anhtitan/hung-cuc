<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Mời Đám Cưới - Quang Hưng & Kim Cúc</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #e6f0e6;
            --text-color: #3b4d40;
            --envelope-color: #7a8e73;
            --seal-color: #a7976e;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-color);
            overflow: hidden;
        }

        .invite-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .top-text {
            letter-spacing: 5px;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 600;
            color: #556c55;
        }

        .guest-name {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin: 0 0 50px 0;
            color: #243627;
            font-weight: 400;
        }

        .envelope-wrapper {
            position: relative;
            width: 450px;
            max-width: 90%;
            margin: 0 auto 60px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .envelope-wrapper:hover {
            transform: translateY(-8px);
        }

        .envelope-img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
            animation: breathe 3.5s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }
        }

        .click-icon {
            position: absolute;
            top: 70%;
            left: 55%;
            width: 35px;
            z-index: 5;
            animation: bounce 1.5s infinite;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(6px, 6px);
            }
        }

        .couple-name {
            letter-spacing: 4px;
            font-size: 1.45rem;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            font-weight: 800;
            color: #111d13;
        }

        .couple-name span {
            font-family: 'Great Vibes', cursive;
            font-size: 2.6rem;
            text-transform: lowercase;
            margin: 0 10px;
            color: #43593b;
            vertical-align: middle;
            font-weight: 400;
        }

        .wedding-date {
            letter-spacing: 3px;
            font-size: 1.35rem;
            font-weight: 800;
            color: #111d13;
        }
    </style>
</head>

<body>

    <div class="invite-container">
        <p class="top-text">TRÂN TRỌNG KÍNH MỜI</p>
        <h1 class="guest-name" id="guestName">bạn</h1>

        <div class="envelope-wrapper" onclick="openInvite()">
            <img class="envelope-img"
                src="https://pub-4ee034abad814cf5b2219f594c28724f.r2.dev/envelop/Screenshot_2026-05-16_095204_pw8jbt.png"
                alt="Phong bì thiệp mời">
            <svg class="click-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- White hand cursor icon -->
                <path
                    d="M12 11V4C12 2.89543 11.1046 2 10 2C8.89543 2 8 2.89543 8 4V14.5L5.70711 12.2071C5.31658 11.8166 4.68342 11.8166 4.29289 12.2071C3.90237 12.5976 3.90237 13.2308 4.29289 13.6213L9.58579 18.9142C10.3361 19.6645 11.3537 20.0858 12.4142 20.0858H16C17.6569 20.0858 19 18.7426 19 17.0858V11C19 9.89543 18.1046 9 17 9H16V7C16 5.89543 15.1046 5 14 5C12.8954 5 12 5.89543 12 7V11Z"
                    stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                    fill="rgba(255,255,255,0.2)" />
            </svg>
        </div>

        <p class="couple-name">QUANG HƯNG <span>&</span> KIM CÚC</p>
        <p class="wedding-date">08.08.2026</p>
    </div>

    <script>
        // Lấy tên khách mời từ tham số ?guest= trên URL
        const urlParams = new URLSearchParams(window.location.search);
        let guest = urlParams.get('guest');

        const guestNameEl = document.getElementById('guestName');
        if (guest) {
            guestNameEl.textContent = guest;
        } else {
            guestNameEl.textContent = ' ';
        }

        function openInvite() {
            // Hiệu ứng mờ dần và chuyển trang
            document.querySelector('.envelope-wrapper').style.transform = 'scale(1.2)';
            document.querySelector('.envelope-wrapper').style.opacity = '0';

            setTimeout(() => {
                window.location.href = 'wedding.html';
            }, 350);
        }
    </script>
</body>

</html>
